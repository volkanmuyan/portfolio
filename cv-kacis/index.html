<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV KAÇIŞ — İK Simülatörü</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body {
  width:100%; height:100%;
  background:#020208;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-family:'Courier New',monospace;
  overflow:hidden; user-select:none;
}
#gameCanvas {
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  border:2px solid #1a1a3a;
  box-shadow:0 0 80px rgba(80,80,255,0.2), 0 0 160px rgba(80,80,255,0.08);
  max-width:100vw;
  max-height:calc(100vh - 36px);
}
#hint {
  margin-top:6px; font-size:10px; color:#2a2a3a;
  letter-spacing:1px;
}
</style>
</head>
<body>
<canvas id="gameCanvas" width="1060" height="550"></canvas>
<div id="hint">↑ SPACE: ZIPLA &nbsp;|&nbsp; ↓ CTRL: EĞİL &nbsp;|&nbsp; ESC: MENÜ</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 1060, H = 550;
const GROUND = 445;

// ── STATES ────────────────────────────────────────────────────
const ST = { MENU:0, CHAR_SELECT:1, PLAY:2, DEAD:3, LEADER:4 };
let state = ST.MENU;

// ── PERSISTENCE ───────────────────────────────────────────────
function saveLeader(e){
  let lb=JSON.parse(localStorage.getItem('cv_lb2')||'[]');
  lb.push(e); lb.sort((a,b)=>b.score-a.score); lb=lb.slice(0,10);
  localStorage.setItem('cv_lb2',JSON.stringify(lb)); return lb;
}
function getLeaders(){ return JSON.parse(localStorage.getItem('cv_lb2')||'[]'); }

// ── AUDIO ─────────────────────────────────────────────────────
let ac;
function initAC(){ if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)(); }
function tone(f,d,v=0.07,t='square'){
  if(!ac)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type=t; o.frequency.value=f;
  g.gain.setValueAtTime(v,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
  o.start(); o.stop(ac.currentTime+d);
}
const SFX={
  jump: ()=>tone(370,0.1),
  duck: ()=>tone(200,0.07),
  hit:  ()=>{ tone(90,0.4,0.12,'sawtooth'); tone(60,0.5,0.08); },
  score:()=>tone(880,0.04,0.04),
  level:()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.12),i*100)); },
  sel:  ()=>tone(660,0.08),
  click:()=>tone(440,0.06,0.05),
};

// ── INPUT ─────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  if(!keys[e.code]){ keys[e.code]=true; initAC(); onKeyDown(e.code, e.key, e); }
  // Yazma modunda iken Space/Arrow default'unu engelleme
  if(!typingName && ['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  if(typingName) e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; onKeyUp(e.code); });
canvas.addEventListener('click',e=>{
  initAC();
  const r=canvas.getBoundingClientRect();
  onClick((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height));
});

function onKeyDown(code, key, e){
  if(state===ST.MENU)        { SFX.click(); state=ST.CHAR_SELECT; return; }
  if(state===ST.LEADER)      { state=ST.MENU; return; }
  if(state===ST.CHAR_SELECT) { handleCSKey(code, key); return; }
  if(state===ST.PLAY){
    if(code==='Space'||code==='ArrowUp'||code==='KeyW')  player.jump();
    if(code==='ArrowDown'||code==='ControlLeft'||code==='ControlRight'||code==='KeyS') player.startDuck();
    if(code==='Escape') state=ST.MENU;
  }
  if(state===ST.DEAD){
    if(code==='Enter'||code==='Space'){ SFX.click(); resetCS(); state=ST.CHAR_SELECT; }
    if(code==='Escape') state=ST.MENU;
  }
}
function onKeyUp(code){
  if(code==='ArrowDown'||code==='ControlLeft'||code==='ControlRight'||code==='KeyS') player.stopDuck();
}
function onClick(mx,my){
  if(state===ST.MENU)        { SFX.click(); state=ST.CHAR_SELECT; return; }
  if(state===ST.LEADER)      { state=ST.MENU; return; }
  if(state===ST.CHAR_SELECT) { handleCSClick(mx,my); return; }
  if(state===ST.PLAY)        { player.jump(); }
  if(state===ST.DEAD)        { SFX.click(); resetCS(); state=ST.CHAR_SELECT; }
}

// ── CHARACTERS ────────────────────────────────────────────────
const CHARS=[
  {id:0,name:'ALEX',  color:'#4af', desc:'Deneyimli İK / Hızlı',        suit:'#1a3a6a',hair:'#d4a85a',skin:'#F4C2A1'},
  {id:1,name:'JORDAN',color:'#f8a', desc:'Kıdemli Recruiter / Güçlü',    suit:'#3a1a5a',hair:'#1a0e06',skin:'#c0784a'},
  {id:2,name:'SAM',   color:'#af8', desc:'Startup İK / Atik',            suit:'#1a4a2a',hair:'#3a3a3a',skin:'#e8c090'},
  {id:3,name:'TOBY',  color:'#c8a8cc',desc:'İK Temsilcisi / Çok Üzgün', suit:'#7a7060',hair:'#5a3010',skin:'#F0D0B0'},
];

// ── CHAR SELECT ───────────────────────────────────────────────
let selChar=0, typingName=false, playerName='';
const CS={cards:[]};
function resetCS(){ selChar=0; typingName=false; playerName=''; }

function handleCSKey(code, key){
  if(typingName){
    if(code==='Enter'){
      if(playerName.trim().length>0) confirmCS();
      return;
    }
    if(code==='Escape'){ typingName=false; SFX.click(); return; }
    if(code==='Backspace'){
      playerName=playerName.slice(0,-1);
      SFX.duck();
      return;
    }
    // Karakter ekle — e.key tek karakter ise (harf, rakam, boşluk, Türkçe)
    if(key && key.length===1 && playerName.length<14){
      playerName += key;
      SFX.score();
    }
    return;
  }
  if(code==='ArrowLeft'||code==='KeyA'){ selChar=(selChar+3)%4; SFX.sel(); }
  if(code==='ArrowRight'||code==='KeyD'){ selChar=(selChar+1)%4; SFX.sel(); }
  if(code==='Enter'||code==='Space') startTyping();
}
function handleCSClick(mx,my){
  if(typingName){
    if(mx>W/2-100&&mx<W/2+100&&my>355&&my<390&&playerName.trim().length>0) confirmCS();
    return;
  }
  CS.cards.forEach((c,i)=>{
    if(mx>c.x&&mx<c.x+c.w&&my>c.y&&my<c.y+c.h){
      if(selChar===i) startTyping(); else { selChar=i; SFX.sel(); }
    }
  });
  if(mx>W-170&&mx<W-20&&my>H-52&&my<H-20){ state=ST.LEADER; SFX.click(); }
}
function startTyping(){
  typingName=true; playerName='';
  SFX.sel();
}
function confirmCS(){
  if(!playerName.trim()) return;
  typingName=false; startGame();
}

// ══════════════════════════════════════════════════════════════
//  DAY / NIGHT CYCLE
// ══════════════════════════════════════════════════════════════
// dayTime: 0=gece yarısı, 0.25=şafak, 0.5=öğle, 0.75=akşam
let dayTime = 0.0; // Gece ile başla
const DAY_SPEED = 1 / (60 * 45); // 45 saniyelik tam gün döngüsü

// Gökyüzü renk anahtar noktaları — [zaman, [üst,orta,alt]] RGB dizileri
const SKY_KF = [
  [0.00, [[4,4,14],  [7,9,26],  [14,18,50]]],  // gece yarısı
  [0.22, [[4,4,14],  [7,9,26],  [14,18,50]]],  // geç gece
  [0.28, [[18,6,28], [90,22,10],[210,80,20]]],  // şafak başlangıcı
  [0.38, [[12,22,60],[25,70,130],[75,145,200]]], // sabah
  [0.50, [[18,95,195],[30,135,210],[95,185,240]]],// öğle
  [0.62, [[12,65,150],[22,100,175],[80,155,210]]],// öğleden sonra
  [0.72, [[22,6,38], [110,18,8],[230,65,8]]],  // gün batımı
  [0.82, [[10,4,18], [18,8,26], [35,16,52]]],  // alacakaranlık
  [1.00, [[4,4,14],  [7,9,26],  [14,18,50]]],  // gece yarısı
];

function lerpRGB(a,b,t){ return a.map((v,i)=>~~(v+(b[i]-v)*t)); }

function getSkyColors(){
  const dt = dayTime % 1;
  let k0=SKY_KF[0], k1=SKY_KF[1];
  for(let i=0;i<SKY_KF.length-1;i++){
    if(dt>=SKY_KF[i][0] && dt<SKY_KF[i+1][0]){ k0=SKY_KF[i]; k1=SKY_KF[i+1]; break; }
  }
  const seg = k1[0]-k0[0];
  const t   = seg>0 ? (dt-k0[0])/seg : 0;
  return k0[1].map((c,i)=>lerpRGB(c, k1[1][i], t));
}

function getStarAlpha(){
  const dt=dayTime%1;
  if(dt<0.22) return 0.8;
  if(dt<0.35) return 0.8*(1-(dt-0.22)/0.13);
  if(dt<0.65) return 0;
  if(dt<0.78) return 0.8*((dt-0.65)/0.13);
  return 0.8;
}

function getDaylightFactor(){
  const dt=dayTime%1;
  if(dt<0.3)  return 0;
  if(dt<0.45) return (dt-0.3)/0.15;
  if(dt<0.65) return 1;
  if(dt<0.8)  return 1-(dt-0.65)/0.15;
  return 0;
}

// Güneşin gökyüzündeki pozisyonu
function getSunPos(){
  const dt=dayTime%1;
  if(dt<0.25||dt>0.75) return null;
  const t=(dt-0.25)/0.5;
  const sx=~~(W*t);
  const sy=~~(GROUND - Math.sin(t*Math.PI)*(GROUND*0.82));
  return {sx, sy};
}

// Ayın gökyüzündeki pozisyonu
function getMoonPos(){
  const dt=dayTime%1;
  // Gün batımından şafağa: 0.75 → 1.25 (0.25 ile wrap)
  let nt = dt<0.25 ? dt+0.5 : (dt>0.75 ? dt-0.5 : null);
  if(nt===null) return null;
  const t=(nt-0.25)/0.5;
  const sx=~~(W*t);
  const sy=~~(GROUND - Math.sin(t*Math.PI)*(GROUND*0.75));
  return {sx,sy};
}

function getTimeLabel(){
  const h=~~(dayTime%1 * 24);
  const m=~~((dayTime%1*24-h)*60);
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
}
function getTimeName(){
  const dt=dayTime%1;
  if(dt<0.05||dt>0.92) return 'Gece Yarısı';
  if(dt<0.26) return 'Gece';
  if(dt<0.34) return 'Şafak';
  if(dt<0.46) return 'Sabah';
  if(dt<0.56) return 'Öğle';
  if(dt<0.68) return 'Öğleden Sonra';
  if(dt<0.78) return 'Gün Batımı';
  return 'Akşam';
}

// ── BACKGROUND BUILDINGS ──────────────────────────────────────
const BG_LAYERS=[];
function rng(s){ let x=Math.sin(s+1)*10000; return x-Math.floor(x); }

function buildBG(){
  BG_LAYERS.length=0;
  // Layer 0 — çok uzak (çok yavaş)
  const L0=[]; let sx=0;
  for(let i=0;i<70;i++){
    const w=18+~~(rng(i*3)*38); const h=50+~~(rng(i*3+1)*200);
    L0.push({x:sx,w,h,glass:rng(i*3+2)>0.5,setback:rng(i*3+3)>0.6,
      sbH:~~(rng(i*3+4)*50)+15, sbW:~~(rng(i*3+5)*0.5*w+0.2*w),
      antenna:h>180&&rng(i*3+6)>0.5});
    sx+=w+~~(rng(i*3+7)*10)+2;
  }
  BG_LAYERS.push({items:L0,totalW:sx,speed:0.18,baseCol:[10,14,32]});

  // Layer 1 — orta mesafe
  const L1=[]; sx=0;
  for(let i=0;i<55;i++){
    const w=26+~~(rng(i*7+5)*55); const h=80+~~(rng(i*7+6)*260);
    L1.push({x:sx,w,h,glass:rng(i*7+7)>0.38,setback:rng(i*7+8)>0.55,
      sbH:~~(rng(i*7+9)*70)+20, sbW:~~(rng(i*7+10)*0.4*w+0.2*w),
      antenna:h>200&&rng(i*7+11)>0.45,logo:rng(i*7+12)>0.75});
    sx+=w+~~(rng(i*7+13)*18)+5;
  }
  BG_LAYERS.push({items:L1,totalW:sx,speed:0.48,baseCol:[9,14,30]});

  // Layer 2 — ön plan
  const L2=[]; sx=0;
  for(let i=0;i<50;i++){
    const w=30+~~(rng(i*11+3)*60); const h=100+~~(rng(i*11+4)*300);
    L2.push({x:sx,w,h,glass:rng(i*11+5)>0.32,setback:rng(i*11+6)>0.5,
      sbH:~~(rng(i*11+7)*80)+25, sbW:~~(rng(i*11+8)*0.5*w+0.2*w),
      antenna:h>180&&rng(i*11+9)>0.4,logo:rng(i*11+10)>0.72});
    sx+=w+~~(rng(i*11+11)*22)+6;
  }
  BG_LAYERS.push({items:L2,totalW:sx,speed:1.0,baseCol:[7,10,22]});
}

let scrollX=[0,0,0];
function updateScroll(spd){ scrollX=scrollX.map((v,i)=>v+spd*BG_LAYERS[i].speed); }

function drawBGLayer(idx){
  const layer=BG_LAYERS[idx];
  const dayF=getDaylightFactor();
  const starA=getStarAlpha();
  // Binalar gündüz daha açık renk, gece koyu
  const br=layer.baseCol;
  const dayBoost=~~(dayF*30);
  const bCol=`rgb(${br[0]+dayBoost},${br[1]+dayBoost},${br[2]+dayBoost})`;

  // Pencere parlaklığı: gece yüksek, gündüz düşük
  const nightWinA = 1-dayF*0.85;

  layer.items.forEach(b=>{
    const tw=layer.totalW;
    const off=scrollX[idx];
    for(let rep=0;rep<3;rep++){
      const bx=~~(((b.x - off%tw + tw)%tw) + rep*tw - tw);
      if(bx>W+100) continue;
      if(bx+b.w<-10) continue;
      const by=~~(GROUND-b.h);

      // Ana gövde
      ctx.fillStyle=bCol;
      ctx.fillRect(bx,by,b.w,b.h);

      // Setback (üst küçülme)
      if(b.setback){
        const sbx=bx+(b.w-b.sbW)/2;
        ctx.fillStyle=bCol;
        ctx.fillRect(~~sbx,by-b.sbH,b.sbW,b.sbH+2);
      }

      // Cam cephe tonu
      if(b.glass){
        const glassA=dayF*0.12+0.04;
        ctx.fillStyle=`rgba(80,160,255,${glassA})`;
        ctx.fillRect(bx,by,b.w,b.h);
        // Gündüz cam parlaması
        if(dayF>0.3){
          ctx.fillStyle=`rgba(255,255,255,${dayF*0.06})`;
          ctx.fillRect(bx+2,by,4,b.h*0.4);
        }
      }

      // Pencere ızgarası
      for(let wy=8;wy<b.h-6;wy+=10){
        for(let wx=4;wx<b.w-5;wx+=8){
          const lit=rng(b.x+wx+wy*3+idx)>0.3;
          if(lit){
            const wa=nightWinA*(0.6+rng(b.x+wx*2+wy)*0.4);
            const warm=b.glass?`rgba(120,200,255,${wa*0.22})`:`rgba(255,220,120,${wa*0.16})`;
            ctx.fillStyle=warm;
            ctx.fillRect(bx+wx,by+wy,5,6);
          }
        }
      }

      // Kat çizgileri
      ctx.fillStyle=`rgba(0,0,0,${0.15+dayF*0.05})`;
      for(let fl=24;fl<b.h;fl+=28) ctx.fillRect(bx,by+fl,b.w,1);

      // Anten
      if(b.antenna){
        const ax=~~(bx+b.w/2);
        const ay=~~(by-(b.setback?b.sbH:0));
        ctx.fillStyle=`rgb(${60+dayBoost},${60+dayBoost},${60+dayBoost})`;
        ctx.fillRect(ax-1,ay-26,2,26);
        if(Math.floor(Date.now()/600)%2===0&&starA>0.1){
          ctx.fillStyle=`rgba(255,50,50,${0.5+starA*0.5})`;
          ctx.fillRect(ax-1,ay-28,3,3);
        }
      }

      // Logo paneli
      if(b.logo&&b.h>150){
        ctx.fillStyle=`rgba(255,255,255,${0.04+dayF*0.04})`;
        ctx.fillRect(~~(bx+b.w*0.2),by+12,~~(b.w*0.6),18);
      }
    }
  });
}

// ── SKY ───────────────────────────────────────────────────────
function drawSky(){
  const cols=getSkyColors();
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,  `rgb(${cols[0]})`);
  g.addColorStop(0.45,`rgb(${cols[1]})`);
  g.addColorStop(1,  `rgb(${cols[2]})`);
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,GROUND);

  // Atmosferik sis / ufuk parlaması gündüz
  const dayF=getDaylightFactor();
  if(dayF>0.2){
    const haze=ctx.createLinearGradient(0,GROUND*0.6,0,GROUND);
    haze.addColorStop(0,'rgba(100,180,255,0)');
    haze.addColorStop(1,`rgba(150,210,255,${dayF*0.08})`);
    ctx.fillStyle=haze; ctx.fillRect(0,0,W,GROUND);
  }

  // Şafak/gün batımı rengi — ufukta turuncu yayılma
  const dt=dayTime%1;
  const sunriseGlow=(dt>0.24&&dt<0.42)?Math.sin((dt-0.24)/0.18*Math.PI):0;
  const sunsetGlow =(dt>0.68&&dt<0.82)?Math.sin((dt-0.68)/0.14*Math.PI):0;
  const glowI=Math.max(sunriseGlow,sunsetGlow);
  if(glowI>0.01){
    const horizonGrad=ctx.createLinearGradient(0,GROUND*0.55,0,GROUND);
    horizonGrad.addColorStop(0,`rgba(220,80,10,0)`);
    horizonGrad.addColorStop(0.6,`rgba(240,110,10,${glowI*0.45})`);
    horizonGrad.addColorStop(1,`rgba(255,150,20,${glowI*0.6})`);
    ctx.fillStyle=horizonGrad; ctx.fillRect(0,0,W,GROUND);
  }
}

// ── YILDIZLAR ─────────────────────────────────────────────────
const STARS=Array.from({length:130},(_,i)=>({
  x:rng(i*2)*W, y:rng(i*2+1)*(GROUND*0.6),
  s:rng(i*2+2)*1.8+0.3, t:rng(i*2+3)*Math.PI*2
}));
function drawStars(){
  const base=getStarAlpha();
  if(base<0.01) return;
  STARS.forEach(s=>{
    const a=base*(0.4+0.4*Math.sin(s.t+dayTime*18));
    ctx.fillStyle=`rgba(210,225,255,${a})`;
    ctx.fillRect(~~s.x,~~s.y,Math.ceil(s.s),Math.ceil(s.s));
  });
}

// ── AY ve GÜNEŞ ───────────────────────────────────────────────
function drawCelestialBodies(gframe){
  // AY
  const moon=getMoonPos();
  if(moon){
    const starA=getStarAlpha();
    if(starA>0.05){
      const moonA=Math.min(1,starA*1.4);
      ctx.globalAlpha=moonA;
      ctx.fillStyle='rgba(225,235,255,0.95)';
      ctx.beginPath(); ctx.arc(moon.sx,moon.sy,20,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(4,4,14,0.93)';
      ctx.beginPath(); ctx.arc(moon.sx+7,moon.sy-5,18,0,Math.PI*2); ctx.fill();
      // Ay halosu
      const halo=ctx.createRadialGradient(moon.sx,moon.sy,18,moon.sx,moon.sy,50);
      halo.addColorStop(0,`rgba(200,220,255,${moonA*0.12})`);
      halo.addColorStop(1,'rgba(200,220,255,0)');
      ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(moon.sx,moon.sy,50,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  }

  // GÜNEŞ
  const sun=getSunPos();
  if(sun && !isNaN(sun.sx) && !isNaN(sun.sy)){
    const dayF=getDaylightFactor();
    const dt=dayTime%1;
    const t2=dt<0.5?(dt-0.25)/0.25:Math.max(0,(0.75-dt)/0.25);
    const sunR=255, sunG=~~(160+t2*95), sunB=~~(t2*80);
    const sunA=Math.min(1,dayF*1.5+0.1);

    try {
      ctx.globalAlpha=sunA;
      const halo2=ctx.createRadialGradient(sun.sx,sun.sy,15,sun.sx,sun.sy,80);
      halo2.addColorStop(0,`rgba(${sunR},${sunG},${sunB},0.3)`);
      halo2.addColorStop(0.5,`rgba(${sunR},${Math.max(0,sunG>>1)},20,0.1)`);
      halo2.addColorStop(1,'rgba(255,180,0,0)');
      ctx.fillStyle=halo2; ctx.beginPath(); ctx.arc(sun.sx,sun.sy,80,0,Math.PI*2); ctx.fill();

      ctx.fillStyle=`rgb(${sunR},${sunG},${sunB})`;
      ctx.beginPath(); ctx.arc(sun.sx,sun.sy,14,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`rgba(255,255,220,0.6)`;
      ctx.beginPath(); ctx.arc(sun.sx-3,sun.sy-3,8,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;

      if(dayF>0.3){
        const sunShine=ctx.createRadialGradient(sun.sx,GROUND,0,sun.sx,GROUND,300);
        sunShine.addColorStop(0,`rgba(255,220,100,${dayF*0.05})`);
        sunShine.addColorStop(1,'rgba(255,220,100,0)');
        ctx.fillStyle=sunShine; ctx.fillRect(0,0,W,GROUND);
      }
    } catch(e){ /* güvenli geçiş */ }
    ctx.globalAlpha=1;
  }
}

// ── ZEMIN ─────────────────────────────────────────────────────
let groundScroll=0;
function drawGround(){
  const dayF=getDaylightFactor();
  const br=~~(dayF*20);
  ctx.fillStyle=`rgb(${6+br},${10+br},${20+br})`;
  ctx.fillRect(0,GROUND,W,H-GROUND);

  // Zemin çizgisi
  ctx.fillStyle=`rgb(${14+br},${18+br},${35+br})`;
  ctx.fillRect(0,GROUND,W,4);

  // Kaldırım dikey çizgiler
  const tw=60;
  for(let i=0;i<Math.ceil(W/tw)+2;i++){
    ctx.fillStyle=`rgba(0,0,0,${0.15-dayF*0.05})`;
    ctx.fillRect(~~(i*tw-(groundScroll%tw)),GROUND+4,1,H-GROUND-4);
  }
  // Yatay kat çizgisi
  ctx.fillStyle=`rgba(255,255,255,${0.03+dayF*0.02})`;
  ctx.fillRect(0,GROUND+18,W,1);

  // Zemin parlaması (gece)
  const nightF=1-dayF;
  if(nightF>0.2){
    for(let i=0;i<5;i++){
      const wx=~~((groundScroll*0.35+i*240)%(W+200))-100;
      ctx.fillStyle=`rgba(60,80,220,${nightF*0.04})`;
      ctx.fillRect(wx,GROUND+6,100,3);
    }
  }
  // Gündüz zemin parlaması
  if(dayF>0.3){
    ctx.fillStyle=`rgba(150,200,255,${dayF*0.04})`;
    ctx.fillRect(0,GROUND,W,H-GROUND);
  }
}

// ── KARAKTERLERİN ÇİZİMİ ─────────────────────────────────────
function drawChar(cx,gy,fr,duck,cid){
  const ch=CHARS[cid]; ctx.save();
  const S=2;
  function p(gx,gy2,pw,ph,col){
    ctx.fillStyle=col;
    ctx.fillRect(cx-16+gx*S, gy-(duck?30:50)+gy2*S, pw*S, ph*S);
  }
  const sk=ch.skin, su=ch.suit, ha=ch.hair;

  // ── TOBY (The Office) ────────────────────────────────────────
  if(cid===3){
    if(duck){
      // Toby eğilmiş — hüzünlü çömelme
      p(4,0,8,6,sk); p(3,0,9,2,ha);
      // üzgün gözler (hafif kapalı)
      p(4,2,2,1,'#3a2a2a'); p(9,2,2,1,'#3a2a2a');
      // aşağı eğri ağız
      p(6,4,1,1,'#b07060'); p(9,4,1,1,'#b07060');
      // hırka (geniş yaka)
      p(2,6,12,7,su); p(0,7,2,5,su); p(13,7,2,5,su);
      p(2,12,5,3,'#5a5040'); p(8,12,5,3,'#5a5040');
      // gevşek kravat
      p(7,6,2,5,'#8a6a5a');
    } else {
      const L=[[3,10,4,13],[5,10,2,13],[3,12,4,11],[5,12,2,11]][fr%4];
      const [la,,ra]=L;
      // Baş — hafif öne eğik
      p(4,1,6,6,sk); p(3,2,8,5,sk);
      // saç — kahverengi, ortadan ayrılmış, dağınık
      p(3,1,10,2,ha); p(3,1,1,3,ha); p(12,1,1,3,ha);
      p(4,0,8,2,ha); // Saçak
      p(6,0,2,1,'#7a4520'); // orta ayrım
      // kulaklar
      p(3,3,1,2,sk); p(12,3,1,2,sk);
      // Üzgün gözler — yarı kapalı, kaşlar içe dönük
      p(5,3,2,1,'#3a2a2a'); p(9,3,2,1,'#3a2a2a');
      p(5,2,2,1,'#9a7060'); p(9,2,2,1,'#9a7060'); // kaşlar (aşağı eğim)
      // Aşağı dönük ağız
      p(6,5,1,1,'#b07060'); p(9,5,1,1,'#b07060');
      p(7,5,2,1,sk); // orta düz
      // Gri-bej hırka — düzensiz yaka
      p(3,7,10,11,su); p(2,7,2,9,su); p(12,7,2,9,su);
      // Hırka v-yaka
      p(6,7,4,1,'#c8b8a8'); // açık renk iç gömlek
      p(7,8,2,2,'#c8b8a8');
      // Gevşek, eğri kravat
      p(7,8,2,6,'#9a7a6a'); p(7,7,2,1,'#9a7a6a');
      p(6,12,4,3,'#9a7a6a');
      // Hırka düğmeleri
      p(8,11,1,1,'#6a6050'); p(8,13,1,1,'#6a6050');
      // Hırka dokusu çizgileri
      p(3,9,1,5,'#706050'); p(13,9,1,5,'#706050');
      // Bacaklar — yorgun koşu
      p(4,18,4,la,'#4a4a4a'); p(8,18,4,ra,'#4a4a4a');
      p(3,18+la,5,2,'#2a2a2a'); p(7,18+ra,5,2,'#2a2a2a');
      // Kağıt yığını (evrak çantası değil — Toby raporlar taşır)
      const pw2=~~(Math.sin(fr*Math.PI/2)*1.5);
      p(13,9+pw2,5,6,'#e8e0d0');  // kağıt
      p(13,9+pw2,5,1,'#c8c0b0');  // üst kenar
      p(14,10+pw2,3,1,'#aaa8a0'); // çizgi
      p(14,11+pw2,3,1,'#aaa8a0');
      p(14,12+pw2,3,1,'#aaa8a0');
    }
    ctx.restore(); return;
  }

  // ── DİĞER KARAKTERLER ────────────────────────────────────────
  if(duck){
    p(4,0,8,6,sk); p(3,0,9,2,ha); p(3,1,1,2,sk); p(12,1,1,2,sk);
    p(4,2,2,1,'#222'); p(9,2,2,1,'#222');
    p(1,6,14,7,su); p(0,7,2,5,su); p(13,7,2,5,su);
    p(2,12,5,3,'#111'); p(8,12,5,3,'#111');
    p(7,6,2,5,cid===0?'#c0392b':cid===1?'#8e44ad':'#27ae60');
    if(cid===2){ p(3,-2,10,2,'#555'); p(2,-1,12,1,'#666'); }
  } else {
    const L=[[3,10,4,13],[5,10,2,13],[3,12,4,11],[5,12,2,11]][fr%4];
    const [la,,ra]=L;
    p(4,0,6,6,sk); p(3,1,8,5,sk); p(3,0,9,2,ha);
    if(cid===0){ p(3,1,1,3,ha); p(12,1,1,3,ha); }
    else if(cid===1){ p(2,2,2,7,ha); p(12,2,2,7,ha); }
    else { p(3,-2,10,2,'#555'); p(2,-1,12,1,'#666'); p(2,0,1,2,'#555'); p(13,0,1,2,'#555'); }
    p(3,2,1,2,sk); p(12,2,1,2,sk);
    p(5,2,2,1,'#1a1a1a'); p(9,2,2,1,'#1a1a1a');
    p(7,4,2,1,'#b06050');
    p(3,7,10,10,su); p(2,7,2,8,su); p(12,7,2,8,su);
    p(6,6,4,1,'#eee');
    const tie=cid===0?'#c0392b':cid===1?'#8e44ad':'#27ae60';
    p(7,7,2,8,tie); p(7,6,2,1,tie); p(6,13,4,2,tie);
    p(8,10,1,1,'#ccc'); p(8,12,1,1,'#ccc');
    p(4,17,4,la,'#111'); p(8,17,4,ra,'#111');
    p(3,17+la,5,2,'#0a0a0a'); p(7,17+ra,5,2,'#0a0a0a');
    const sw=~~(Math.sin(fr*Math.PI/2)*2);
    p(13,9+sw,4,5,'#7a5c14'); p(14,8+sw,2,2,'#5a4010'); p(13,10+sw,4,1,'#9a7c24');
  }
  ctx.restore();
}

const player={
  x:145, y:GROUND, vy:0,
  isJumping:false, isDucking:false,
  animFrame:0, animTick:0,
  charId:0, name:'???',
  normalH:50, duckH:30,
  get h(){ return this.isDucking?this.duckH:this.normalH; },

  jump(){
    if(!this.isJumping){
      this.vy=-18.5;
      this.isJumping=true; this.isDucking=false;
      SFX.jump();
    }
  },
  startDuck(){ if(!this.isJumping){ this.isDucking=true; SFX.duck(); } },
  stopDuck(){  this.isDucking=false; },

  update(){
    if(this.isJumping||this.y<GROUND){
      const floaty=Math.abs(this.vy)<5?0.55:0.75;
      this.vy+=0.78*floaty+0.18;
      this.y+=this.vy;
      if(this.y>=GROUND){ this.y=GROUND; this.vy=0; this.isJumping=false; }
    }
    this.animTick++;
    if(this.animTick>=(this.isDucking?14:6)){
      this.animTick=0; this.animFrame=(this.animFrame+1)%4;
    }
  },

  hitbox(){
    const pad=5;
    return {x:this.x-16+pad, y:this.y-this.h, w:32-pad*2, h:this.h};
  },

  draw(){
    drawChar(~~this.x,~~this.y,this.animFrame,this.isDucking,this.charId);
    ctx.fillStyle=CHARS[this.charId].color;
    ctx.font='bold 9px "Courier New"';
    ctx.textAlign='center';
    ctx.fillText(this.name,~~this.x,~~this.y-this.h-6);
  }
};

let parts=[];
function spawnParts(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*0.5, sp=2+Math.random()*4;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      life:40+Math.random()*20,ml:60,col,sz:2+Math.random()*3});
  }
}
function spawnText(x,y,txt,col='#ffd700'){
  parts.push({x,y,vx:(Math.random()-0.5)*2,vy:-3.5,life:55,ml:55,col,isText:true,txt});
}
function updateParts(){ parts=parts.filter(p=>{ p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life--;return p.life>0; }); }
function drawParts(){
  parts.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/p.ml);
    if(p.isText){
      ctx.font=`bold 11px 'Courier New'`; ctx.fillStyle=p.col; ctx.textAlign='center';
      ctx.fillText(p.txt,~~p.x,~~p.y);
    } else {
      ctx.fillStyle=p.col;
      ctx.fillRect(~~p.x,~~p.y,Math.ceil(p.sz),Math.ceil(p.sz));
    }
  });
  ctx.globalAlpha=1;
}

// ── ÇARPIŞMA ──────────────────────────────────────────────────
function hitTest(r,cv){
  const p=7, r2={x:cv.x+p,y:cv.y+p,w:cv.w-p*2,h:cv.h-p*2};
  return r.x<r2.x+r2.w&&r.x+r.w>r2.x&&r.y<r2.y+r2.h&&r.y+r.h>r2.y;
}

// ── OYUN DEĞİŞKENLERİ ─────────────────────────────────────────
let score=0,level=1,gameSpeed=3.2,frame=0,dodged=0;

function startGame(){
  score=0; level=1; gameSpeed=3.2; frame=0; dodged=0;
  cvList=[]; parts=[]; spawnTick=0; spawnInterval=90;
  scrollX=[0,0,0]; groundScroll=0;
  dayTime=0.0; // gece ile başla
  player.x=145; player.y=GROUND; player.vy=0;
  player.isJumping=false; player.isDucking=false;
  player.charId=selChar;
  player.name=(playerName.trim()||CHARS[selChar].name).toUpperCase().slice(0,14);
  state=ST.PLAY;
}

function updateGame(){
  frame++;
  dayTime+=DAY_SPEED;

  gameSpeed=3.2+score*0.0011+level*0.5;
  const nl=Math.floor(score/400)+1;
  if(nl>level){
    level=nl; spawnInterval=Math.max(36,90-level*9);
    SFX.level();
    spawnParts(W/2,H/2,'#ffd700',28);
    spawnText(W/2,H/2-45,`SEVİYE ${level}!`);
  }

  updateScroll(gameSpeed);
  groundScroll+=gameSpeed;
  player.update();

  spawnTick++;
  if(spawnTick>=spawnInterval){ spawnTick=0; spawnCV(); }

  const hb=player.hitbox();
  for(let i=cvList.length-1;i>=0;i--){
    const cv=cvList[i];
    cv.x-=gameSpeed; cv.rot+=cv.rotV;
    if(!cv.passed&&cv.x+cv.w<player.x-16){
      cv.passed=true; score+=cv.pts; dodged++;
      SFX.score();
      spawnText(cv.x+cv.w/2,cv.y-8,DODGE_Q[~~(Math.random()*DODGE_Q.length)]);
      spawnParts(cv.x+cv.w/2,cv.y+cv.h/2,cv.acc,5);
    }
    if(cv.x+cv.w<-30){ cvList.splice(i,1); continue; }
    if(hitTest(hb,cv)){
      SFX.hit();
      spawnParts(player.x,player.y-25,'#ff4444',20);
      spawnParts(cv.x+cv.w/2,cv.y+cv.h/2,cv.acc,14);
      saveLeader({name:player.name,score,level,dodged,char:player.charId});
      const pool=player.charId===3?IRONIC_TOBY:IRONIC;
      deadMsg=pool[~~(Math.random()*pool.length)];
      state=ST.DEAD; return;
    }
  }
  updateParts();
}

  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
  ctx.strokeRect(W/2-200,224,400,120);
  ctx.font='bold 10px "Courier New"'; ctx.fillStyle='#ffd700';
  ctx.fillText('⬟ LİDERLİK TABLOSU ⬟',W/2,242);
  ctx.font='9px "Courier New"';
  if(!lb.length){ ctx.fillStyle='#445'; ctx.fillText('Henüz skor yok — ilk oynayan siz olun!',W/2,272); }
  else lb.slice(0,5).forEach((e,i)=>{
    ctx.fillStyle=i===0?'#ffd700':i===1?'#bbb':i===2?'#c84':'#556';
    ctx.fillText(`${i+1}. ${(e.name||'?').padEnd(12,' ')}  ${e.score}  Sev.${e.level}`,W/2,258+i*18);
  });

  if(Math.sin(menuF*0.07)>0){
    ctx.font='bold 16px "Courier New"'; ctx.fillStyle='#4fc';
    ctx.fillText('[ BAŞLAMAK İÇİN TIKLA VEYA HERHANGİ BİR TUŞA BAS ]',W/2,374);
  }

  ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(W-180,H-52,158,30);
  ctx.font='10px "Courier New"'; ctx.fillStyle='#aaa';
  ctx.fillText('TÜM SKORLAR ►',W-105,H-32);

  // Saat
  const timeCol=getDaylightFactor()>0.5?'#ffdd88':getDaylightFactor()>0.2?'#ff9955':'#88aaff';
  ctx.font='10px "Courier New"'; ctx.fillStyle=timeCol;
  ctx.textAlign='left'; ctx.fillText(`${getTimeLabel()} — ${getTimeName()}`,16,H-12);
  ctx.restore();
}

// ── KARAKTER SEÇİMİ ───────────────────────────────────────────
let csF=0;
function drawCharSelect(){
  csF++;
  dayTime+=DAY_SPEED*0.4;
  updateScroll(0.8); groundScroll+=0.8;
  drawScene();
  ctx.fillStyle='rgba(0,0,10,0.58)'; ctx.fillRect(0,0,W,H);

  ctx.save(); ctx.textAlign='center';
  ctx.font='bold 22px "Courier New"'; ctx.fillStyle='#cdf';
  ctx.fillText('KARAKTERİNİZİ SEÇİN',W/2,55);
  ctx.font='11px "Courier New"'; ctx.fillStyle='#446';
  ctx.fillText('← → tuşları ile seçin • ENTER ile onayla',W/2,75);

  CS.cards=[];
  const cW=162,cH=215,gap=16;
  const tot=CHARS.length*cW+(CHARS.length-1)*gap;
  const sx=(W-tot)/2;

  CHARS.forEach((ch,i)=>{
    const cx=sx+i*(cW+gap), cy=95;
    CS.cards.push({x:cx,y:cy,w:cW,h:cH});
    const sel=selChar===i;

    if(sel){ ctx.shadowColor=ch.color; ctx.shadowBlur=22; }
    // Toby kartı hafif farklı renk
    const cardBg = i===3
      ? (sel?'rgba(200,168,204,0.12)':'rgba(200,168,204,0.04)')
      : (sel?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.04)');
    ctx.fillStyle=cardBg;
    ctx.fillRect(cx,cy,cW,cH);
    ctx.strokeStyle=sel?ch.color:'#2a2a4a'; ctx.lineWidth=sel?2:1;
    ctx.strokeRect(cx,cy,cW,cH);
    ctx.shadowBlur=0;

    // Toby kartında küçük "DUNDER MIFFLIN HR" etiketi
    if(i===3){
      ctx.font='7px "Courier New"'; ctx.fillStyle='#5a4a5a';
      ctx.textAlign='center';
      ctx.fillText('DUNDER MİFFLİN İK',cx+cW/2,cy+12);
    }

    // Karakter önizleme
    const sc=sel?1.55:1.22;
    ctx.save(); ctx.scale(sc,sc);
    drawChar(~~((cx+cW/2)/sc),~~((cy+185)/sc),(csF>>4)%4,false,i);
    ctx.restore();

    ctx.font=`bold ${sel?15:12}px 'Courier New'`;
    ctx.fillStyle=sel?ch.color:'#557'; ctx.textAlign='center';
    ctx.fillText(ch.name,cx+cW/2,cy+cH-44);
    ctx.font='9px "Courier New"'; ctx.fillStyle='#445';
    ctx.fillText(ch.desc,cx+cW/2,cy+cH-28);
    if(sel){
      ctx.font='bold 10px "Courier New"'; ctx.fillStyle='#4fc';
      ctx.fillText(typingName?'':'ENTER ile seç ►',cx+cW/2,cy+cH-12);
    }
  });

  if(typingName){
    ctx.font='bold 14px "Courier New"'; ctx.fillStyle='#cdf';
    ctx.fillText('ADINI GİR:',W/2,340);
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(W/2-110,348,220,38);
    ctx.strokeStyle=CHARS[selChar].color; ctx.lineWidth=2;
    ctx.strokeRect(W/2-110,348,220,38);
    ctx.font='bold 18px "Courier New"'; ctx.fillStyle='#fff';
    ctx.fillText(playerName+(Math.sin(csF*0.15)>0?'█':''),W/2,372);
    ctx.font='10px "Courier New"'; ctx.fillStyle='#4fc';
    ctx.fillText('ENTER ile başla',W/2,404);
  }
  ctx.restore();
}

// ── GAME OVER ─────────────────────────────────────────────────
const IRONIC=[
  'Teşekkürler, bilgi verdik sayarız.',
  'Maalesef bütçemiz uygun değil.',
  'Profiliniz arşivimize alındı.',
  'Daha uygun adaylarla devam edeceğiz.',
  'Nitelikleriniz pozisyona uymuyor.',
  'Ücret beklentiniz çok yüksek.',
  '"Kıdemsiz aday" arıyorduk.',
  'Açık kapandı, ilginize teşekkürler.',
  'İhtiyaç duyduğumuzda tekrar başvurabilirsiniz.',
];
const IRONIC_TOBY=[
  '"Neden kimse beni sevmiyor..." — Toby',
  '"Michael yine bağırıyor olacak." — Toby',
  '"Yarın da aynı şey." — Toby',
  '"Costa Rica\'ya gitsem mi acaba?" — Toby',
  '"Sakin ol Toby, sakin ol." — Toby',
  '"İK çok yalnız bir iş." — Toby',
  '"Benim de formlarım var ama kimse okumaz." — Toby',
];
let deadMsg='';

function drawDead(){
  frame++;
  dayTime+=DAY_SPEED*0.2;
  drawScene();
  drawParts(); updateParts();
  ctx.fillStyle='rgba(35,0,0,0.72)'; ctx.fillRect(0,0,W,H);

  ctx.save(); ctx.textAlign='center';
  ctx.font='bold 42px "Courier New"'; ctx.fillStyle='#f44';
  ctx.shadowColor='#f00'; ctx.shadowBlur=24;
  ctx.fillText('BAŞVURU ALINDI!',W/2,100); ctx.shadowBlur=0;
  ctx.font='12px "Courier New"'; ctx.fillStyle='#faa';
  ctx.fillText('Bir CV sizi yakaladı. Hesabınız işleme alınıyor...',W/2,132);

  const ch=CHARS[player.charId];
  ctx.fillStyle='rgba(255,255,255,0.05)';
  ctx.fillRect(W/2-260,154,520,160);
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
  ctx.strokeRect(W/2-260,154,520,160);
  ctx.font='bold 12px "Courier New"'; ctx.fillStyle='#ffd700';
  ctx.fillText(`${player.name} — İSTATİSTİKLER`,W/2,176);
  ctx.font='14px "Courier New"'; ctx.fillStyle='#ddd';
  ctx.fillText(`SKOR: ${score}`,W/2-110,204);
  ctx.fillStyle=ch.color;
  ctx.fillText(`SEVİYE: ${level}`,W/2+80,204);
  ctx.fillStyle='#aaa'; ctx.font='11px "Courier New"';
  ctx.fillText(`Görmezden gelinen başvuru: ${dodged}`,W/2,226);

  const lb=getLeaders(), best=lb[0]?.score||1, pct=Math.min(score/best,1);
  ctx.fillStyle='#111'; ctx.fillRect(W/2-170,242,340,12);
  const g2=ctx.createLinearGradient(W/2-170,0,W/2-170+340*pct,0);
  g2.addColorStop(0,ch.color); g2.addColorStop(1,'#ffd700');
  ctx.fillStyle=g2; ctx.fillRect(W/2-170,242,~~(340*pct),12);
  ctx.font='8px "Courier New"'; ctx.fillStyle='#446';
  ctx.fillText(`En iyi skora oran: %${~~(pct*100)}`,W/2,266);

  ctx.font='bold 10px "Courier New"'; ctx.fillStyle='#ffd700';
  ctx.fillText('⬟ LİDERLİK ⬟',W/2,295);
  lb.slice(0,4).forEach((e,i)=>{
    ctx.font='9px "Courier New"';
    ctx.fillStyle=(e.name===player.name&&e.score===score)?ch.color:i===0?'#ffd700':'#446';
    ctx.fillText(`${i+1}. ${e.name}  ${e.score}`,W/2,310+i*16);
  });

  ctx.font='italic 12px "Courier New"'; ctx.fillStyle='#557';
  ctx.fillText(`"${deadMsg}"`,W/2,H-60);
  ctx.font='9px "Courier New"'; ctx.fillStyle='#335';
  ctx.fillText('— İnsan Kaynakları Departmanı',W/2,H-44);

  if(Math.sin(frame*0.07)>0){
    ctx.font='bold 14px "Courier New"'; ctx.fillStyle='#4fc';
    ctx.fillText('[ TEKRAR OYNA — ENTER / SPACE ]',W/2,H-16);
  }
  ctx.restore();
}

// ── LİDERLİK EKRANI ───────────────────────────────────────────
function drawLeader(){
  menuF++;
  dayTime+=DAY_SPEED*0.5;
  updateScroll(1.2); groundScroll+=1.2;
  drawScene();
  ctx.fillStyle='rgba(0,0,10,0.74)'; ctx.fillRect(0,0,W,H);

  ctx.save(); ctx.textAlign='center';
  ctx.font='bold 30px "Courier New"'; ctx.fillStyle='#ffd700';
  ctx.shadowColor='rgba(255,200,0,0.5)'; ctx.shadowBlur=14;
  ctx.fillText('⬟ LİDERLİK TABLOSU ⬟',W/2,60); ctx.shadowBlur=0;
  ctx.font='10px "Courier New"'; ctx.fillStyle='#334';
  ctx.fillText('En yüksek 10 skor  |  Herhangi bir tuşla geri dön',W/2,82);

  const lb=getLeaders();
  const hdr=['#','İSİM','SKOR','SEVİYE','KAÇAN'];
  const c=[W/2-280,W/2-180,W/2+20,W/2+130,W/2+220];
  ctx.font='bold 10px "Courier New"'; ctx.fillStyle='#446';
  hdr.forEach((h,i)=>{ ctx.textAlign='left'; ctx.fillText(h,c[i],112); });
  ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fillRect(W/2-290,116,580,2);

  if(!lb.length){
    ctx.font='12px "Courier New"'; ctx.fillStyle='#335'; ctx.textAlign='center';
    ctx.fillText('Henüz kayıtlı skor yok. Oyunu oyna!',W/2,220);
  } else {
    lb.forEach((e,i)=>{
      const y=136+i*32;
      const rc=i===0?'#ffd700':i===1?'#bbb':i===2?'#c84':'#446';
      const ch=CHARS[e.char||0];
      if(i%2===0){ ctx.fillStyle='rgba(255,255,255,0.02)'; ctx.fillRect(W/2-290,y-16,580,28); }
      ctx.textAlign='left';
      ctx.font=`bold ${i<3?12:10}px 'Courier New'`;
      ctx.fillStyle=rc; ctx.fillText(`${i+1}.`,c[0],y);
      ctx.fillStyle=i<3?ch.color:'#99a'; ctx.fillText(e.name||'?',c[1],y);
      ctx.fillStyle=rc; ctx.fillText(e.score,c[2],y);
      ctx.fillStyle='#446'; ctx.fillText(`Sev.${e.level}`,c[3],y);
      ctx.fillText(e.dodged||0,c[4],y);
    });
  }
  if(Math.sin(menuF*0.07)>0){
    ctx.textAlign='center'; ctx.font='bold 12px "Courier New"'; ctx.fillStyle='#4fc';
    ctx.fillText('[ MENÜYE DÖN — ESC / HERHANGİ BİR TUŞ ]',W/2,H-18);
  }
  ctx.restore();
}

// ── ANA DÖNGÜ ─────────────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,W,H);
  if(state===ST.MENU)        drawMenu();
  else if(state===ST.CHAR_SELECT) drawCharSelect();
  else if(state===ST.PLAY)   { updateGame(); drawGame(); }
  else if(state===ST.DEAD)   drawDead();
  else if(state===ST.LEADER) drawLeader();
  requestAnimationFrame(loop);
}

buildBG();
resetCS();
loop();
</script>
